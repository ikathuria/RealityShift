<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISTRAL HACK: REALITY SHIFT (Flask Edition)</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div id="game-container"></div>
    
    <div id="hud-top">
        <div class="vertical-bars">
            <div class="stat-v-row">
                <div class="v-bar-bg"><div id="health-bar" class="v-bar health"></div></div>
                <span>HP</span>
            </div>
            <div class="stat-v-row">
                <div class="v-bar-bg"><div id="mana-bar" class="v-bar mana"></div></div>
                <span>MP</span>
            </div>
        </div>
        
        <div class="top-center-hud">
             <div id="game-clock">TIME: 12:00</div>
             <div id="sigils">SIGILS: 0/3</div>
             <button id="quest-book-btn" title="Quest Book">📖</button>
        </div>

        <div id="combat-log-container">
            <div id="combat-log">
                <div class="log-entry">> Initializing Reality...</div>
            </div>
        </div>
    </div>

    <div id="inventory-bar">
        <div class="inventory-slot" data-slot="0"></div>
        <div class="inventory-slot" data-slot="1"></div>
        <div class="inventory-slot" data-slot="2"></div>
        <div class="inventory-slot" data-slot="3"></div>
        <div class="inventory-slot" data-slot="4"></div>
    </div>

    <div id="quest-popup" class="hidden">
        <div class="quest-content">
            <button id="close-quest-btn">X</button>
            <h2>QUEST: DEFEAT LILLITH</h2>
            <div class="quest-metric">
                <span>BARRIER STRENGTH:</span>
                <div class="bar-bg"><div id="barrier-bar" class="bar barrier"></div></div>
                <div id="barrier-text">100%</div>
            </div>
            <p>Lillith remains a fragment of the system. Break her barrier to rewrite her code.</p>
        </div>
    </div>

    <div id="recording-indicator" class="hidden">
        <div class="mic-icon"></div>
        <span>SHIFING REALITY...</span>
    </div>

    <script src="/static/js/game.js"></script>
</body>
</html>
